name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install docker-compose -y

      - name: Start LocalStack
        run: docker-compose up -d

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pylint
        run: pylint --fail-under 7 app services

      - name: Run Unit Tests
        run: pytest test_unit.py

      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py -v
          coverage run -m pytest tests/test_integration.py
          coverage report -m
      - name: Run Bandit (Security Scan)
        run: |
          pip install bandit
          bandit -r app services

      - name: Install Playwright Browsers
        run: |
          # Викликаємо через python -m, щоб система точно знайшла пакет
          python -m playwright install --with-deps chromium

      - name: Run UI Tests
        run: |
          pytest tests/test_ui_saucedemo.py